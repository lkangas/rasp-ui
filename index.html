<!doctype html>
<html lang="fi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RASP</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="controls">
  <select id="productSelect"></select>
  <div class="slider-row">
    <span class="slider-label" id="dayLabel">1. päivä</span>
    <input type="range" id="daySlider" min="0" step="1" value="0">
  </div>
  <div class="slider-row">
    <span class="slider-label" id="timeLabel">12:00</span>
    <input type="range" id="timeSlider" min="0" step="1" value="0">
  </div>
</div>

<div class="image-area" id="imageArea">
  <img id="forecastImage" alt="RASP-ennuste">
  <div id="spinner" class="spinner" hidden></div>
  <div id="nodata" class="nodata" hidden>Ei dataa</div>
</div>

<script src="config.js"></script>
<script src="app.js"></script>
</body>
</html>
